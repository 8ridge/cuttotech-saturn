# Конфигурация Nginx для URL Shortener
# Сохраните этот файл как: /etc/nginx/sites-available/url-shortener

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Redirect to HTTPS (будет настроено Certbot)
    # return 301 https://$server_name$request_uri;

    root /var/www/url-shortener/dist;
    index index.html;

    # Мгновенный редирект коротких кодов через Supabase Edge Function
    # Добавьте `env SUPABASE_ANON_KEY;` в /etc/nginx/nginx.conf,
    # либо определите $supabase_anon_key любым другим безопасным способом.
    location ~ ^/(?!(?:admin|dashboard|stats|settings|content|login|signup)$)([0-9A-Za-z]{1,7})$ {
        set $supabase_anon_key $env_SUPABASE_ANON_KEY;
        proxy_pass https://cynaahwuoewjgzryslra.supabase.co/functions/v1/make-server-90636d20/redirect/$1;
        proxy_set_header Authorization "Bearer $supabase_anon_key";
        proxy_set_header apikey $supabase_anon_key;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host cynaahwuoewjgzryslra.supabase.co;
    }

    # Обработка SPA роутинга
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кеширование статических файлов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Логи
    access_log /var/log/nginx/url-shortener-access.log;
    error_log /var/log/nginx/url-shortener-error.log;

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

